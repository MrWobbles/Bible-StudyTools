name: CI Heavy (Manual)

on:
  workflow_dispatch:
    inputs:
      runDesktopBuild:
        description: Also run desktop package build check
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-heavy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  heavy-checks:
    name: Full API integrity checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run heavy checks
        run: npm run test:heavy

  desktop-build-check:
    name: Desktop build check
    if: ${{ inputs.runDesktopBuild }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Desktop unpacked build
        working-directory: desktop
        run: npm run build
