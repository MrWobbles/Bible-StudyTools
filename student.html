<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('bst-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <title>Bible Study Class</title>
  <link rel="icon" href="assets/images/icon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/student.css" />
  <link rel="icon" href="assets/images/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/images/icon.png" />
</head>

<body class="page page--student">
  <div class="page app app--student">
    <header class="app__header">
      <div class="title-group app__title-group">
        <h1>Loading...</h1>
        <p class="subtitle app__subtitle">Loading class content...</p>
      </div>
    </header>

    <div class="layout app__layout app__layout--student">
      <section class="card video-card" id="video-card">
        <div class="player-shell">
          <div id="player"></div>
        </div>

        <div class="controls">
          <button class="primary" id="toggle-play"><span class="material-symbols-outlined"
            style="font-size: 16px; vertical-align: middle; margin-right: 4px;">play_circle</span>Play / Pause</button>
          <button id="restart"><span class="material-symbols-outlined"
            style="font-size: 16px; vertical-align: middle; margin-right: 4px;">restart_alt</span>Restart from 0:00</button>
          <button id="next-pause"><span class="material-symbols-outlined"
            style="font-size: 16px; vertical-align: middle; margin-right: 4px;">skip_next</span>Skip to next pause</button>
          <button id="fullscreen"><span class="material-symbols-outlined"
            style="font-size: 16px; vertical-align: middle; margin-right: 4px;">fullscreen</span>Go fullscreen</button>
        </div>

        <div class="next-stop" id="next-stop">
          <span>Next planned pause:</span>
          <strong>loading…</strong>
        </div>

        <div class="list" id="pause-list"></div>
      </section>

      <section class="card note-card">
        <h3>Session flow</h3>
        <p>Quick prompts to keep you on track while the video plays.</p>
        <div class="list" id="session-outline"></div>
      </section>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/loader.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/student.js"></script>
</body>

</html>
