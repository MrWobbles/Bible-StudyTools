<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Media Player</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }
    
    #video-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background-color: transparent;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block; /* removes bottom spacing in some browsers */
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      font-size: 2rem;
      transition: opacity 0.5s;
    }

    #text-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
      font-size: 80px;
      font-weight: 900;
      text-transform: uppercase;
      color: #fff;
      -webkit-text-stroke: 4px #000; /* Black outline */
      text-shadow: 6px 6px 0 #000, 10px 10px 20px rgba(0,0,0,0.8);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">Waiting for signal...</div>
  <div id="text-overlay"></div>
  <div id="video-container"></div>
  <audio id="sfx-player"></audio>

  <script>
    const videoContainer = document.getElementById('video-container');
    const sfxPlayer = document.getElementById('sfx-player');
    const overlay = document.getElementById('loading-overlay');
    const textOverlay = document.getElementById('text-overlay');
    let currentVideo = null;

    function showText(text) {
      textOverlay.textContent = text;
      textOverlay.style.opacity = '1';
    }

    function hideText() {
      textOverlay.style.opacity = '0';
    }

    function playVideo(url) {
      if (currentVideo) {
        currentVideo.pause();
        currentVideo.remove();
      }
      
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 500);

      const video = document.createElement('video');
      video.src = url;
      video.autoplay = true;
      video.loop = true;
      video.muted = true; // Mute the background video
      video.playsInline = true;
      video.setAttribute('playsinline', ''); // Required for iOS/iPadOS
      
      video.onerror = function() {
        const err = video.error;
        let msg = 'Unknown Error';
        if (err) {
          switch (err.code) {
            case 1: msg = 'MEDIA_ERR_ABORTED'; break;
            case 2: msg = 'MEDIA_ERR_NETWORK'; break;
            case 3: msg = 'MEDIA_ERR_DECODE (Codec not supported by this browser)'; break;
            case 4: msg = 'MEDIA_ERR_SRC_NOT_SUPPORTED (File not found or format not supported)'; break;
          }
        }
        console.error('Video Error:', msg, url);
        alert('Video Error: ' + msg + '\\nURL: ' + url);
      };

      videoContainer.appendChild(video);
      currentVideo = video;
    }

    function playSfx(url, loop = false) {
      sfxPlayer.src = url;
      sfxPlayer.loop = loop;
      sfxPlayer.play().catch(e => console.error('Failed to play SFX:', e));
    }

    function stopAll() {
      if (currentVideo) {
        currentVideo.pause();
        currentVideo.remove();
        currentVideo = null;
      }
      sfxPlayer.pause();
      sfxPlayer.src = '';
      hideText();
      
      overlay.style.display = 'flex';
      setTimeout(() => { overlay.style.opacity = '1'; }, 10);
    }

    // Connect to Server-Sent Events for VBS Control
    function connectSSE() {
      const source = new EventSource('/api/vbs/events');
      
      source.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          
          if (data.type === 'play_video') {
            playVideo(data.payload.url);
          } else if (data.type === 'play_sfx') {
            playSfx(data.payload.url, data.payload.loop);
          } else if (data.type === 'stop_all') {
            stopAll();
          } else if (data.type === 'show_text') {
            showText(data.payload.text);
          } else if (data.type === 'hide_text') {
            hideText();
          }
        } catch (e) {
          console.error('Error parsing SSE message:', e);
        }
      };

      source.onerror = (error) => {
        console.error('SSE Error:', error);
        source.close();
        setTimeout(connectSSE, 3000); // Reconnect after 3s
      };
    }

    // Start SSE connection
    connectSSE();
  </script>
</body>
</html>
