<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Media Player</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    #video-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background-color: transparent;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: translateZ(0);
      will-change: transform;
      /* removes bottom spacing in some browsers */
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      font-size: 2rem;
      transition: opacity 0.5s;
    }

    #text-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
      font-size: 80px;
      font-weight: 900;
      text-transform: uppercase;
      color: #fff;
      -webkit-text-stroke: 4px #000;
      /* Black outline */
      text-shadow: 6px 6px 0 #000, 10px 10px 20px rgba(0, 0, 0, 0.8);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      text-align: center;
    }

    #circle-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
      display: none;
    }

    @keyframes bubble-anim {

      0%,
      100% {
        border-radius: 40% 60% 50% 50% / 50% 50% 60% 40%;
        transform: translate3d(0, 15px, 0) scale3d(0.95, 1.05, 1);
      }

      25% {
        border-radius: 50% 50% 40% 60% / 40% 60% 50% 50%;
        transform: translate3d(10px, 0px, 0) scale3d(1.05, 0.95, 1);
      }

      50% {
        border-radius: 60% 40% 50% 50% / 50% 50% 40% 60%;
        transform: translate3d(0, -15px, 0) scale3d(0.95, 1.05, 1);
      }

      75% {
        border-radius: 50% 50% 60% 40% / 60% 40% 50% 50%;
        transform: translate3d(-10px, 0px, 0) scale3d(1.05, 0.95, 1);
      }
    }

    .magic-circle {
      position: absolute;
      opacity: 0.8;
      transition: top 3s ease-in-out;
      animation: bubble-anim 6s ease-in-out infinite;
      will-change: transform, border-radius, top;
    }

    .magic-circle.white {
      background-color: white;
    }

    .magic-circle.blue {
      background-color: #3b82f6;
    }

    #matrix-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 4;
      display: none;
    }
  </style>
</head>

<body>

  <canvas id="matrix-canvas"></canvas>
  <div id="circle-overlay"></div>
  <div id="loading-overlay">Waiting for signal...</div>
  <div id="text-overlay"></div>
  <div id="video-container"></div>
  <audio id="sfx-player"></audio>

  <script>
    const videoContainer = document.getElementById('video-container');
    const sfxPlayer = document.getElementById('sfx-player');
    const overlay = document.getElementById('loading-overlay');
    const textOverlay = document.getElementById('text-overlay');
    let matrixInterval = null;
    let currentVideo = null;

    function showText(text) {
      textOverlay.textContent = text;
      textOverlay.style.opacity = '1';
    }

    function hideText() {
      textOverlay.style.opacity = '0';
    }

    function playVideo(url) {
      if (currentVideo) {
        currentVideo.pause();
        currentVideo.remove();
      }

      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 500);

      const video = document.createElement('video');
      video.src = url;
      video.preload = 'auto';
      video.autoplay = true;
      video.loop = true;
      video.muted = true; // Mute the background video
      video.playsInline = true;
      video.setAttribute('playsinline', ''); // Required for iOS/iPadOS

      video.onerror = function () {
        const err = video.error;
        let msg = 'Unknown Error';
        if (err) {
          switch (err.code) {
            case 1: msg = 'MEDIA_ERR_ABORTED'; break;
            case 2: msg = 'MEDIA_ERR_NETWORK'; break;
            case 3: msg = 'MEDIA_ERR_DECODE (Codec not supported by this browser)'; break;
            case 4: msg = 'MEDIA_ERR_SRC_NOT_SUPPORTED (File not found or format not supported)'; break;
          }
        }
        console.error('Video Error:', msg, url);
        alert('Video Error: ' + msg + '\\nURL: ' + url);
      };

      videoContainer.appendChild(video);
      currentVideo = video;
    }

    function playSfx(url, loop = false) {
      sfxPlayer.src = url;
      sfxPlayer.loop = loop;
      sfxPlayer.play().catch(e => console.error('Failed to play SFX:', e));
    }

    function stopAll() {
      if (currentVideo) {
        currentVideo.pause();
        currentVideo.remove();
        currentVideo = null;
      }
      sfxPlayer.pause();
      sfxPlayer.src = '';
      hideText();

      if (matrixInterval) clearInterval(matrixInterval);
      const canvas = document.getElementById('matrix-canvas');
      if (canvas) canvas.style.display = 'none';

      overlay.style.display = 'flex';
      setTimeout(() => { overlay.style.opacity = '1'; }, 10);
    }

    function toggleCircles() {
      const overlay = document.getElementById('circle-overlay');
      if (overlay.style.display === 'block') {
        overlay.style.display = 'none';
        overlay.innerHTML = '';
        return;
      }

      overlay.style.display = 'block';
      overlay.innerHTML = '';

      for (let i = 0; i < 400; i++) {
        let circle = document.createElement('div');
        circle.className = i % 2 === 0 ? 'magic-circle white' : 'magic-circle blue';
        let size = Math.random() * 40 + 10;
        circle.style.width = size + 'px';
        circle.style.height = size + 'px';
        circle.style.left = Math.random() * 100 + 'vw';
        circle.style.top = Math.random() * 100 + 'vh';

        circle.style.animationDuration = (Math.random() * 4 + 4) + 's';
        circle.style.animationDelay = '-' + (Math.random() * 8) + 's';

        overlay.appendChild(circle);
      }
    }

    function separateCircles() {
      const viewportWidth = window.innerWidth;
      document.querySelectorAll('.magic-circle').forEach(c => {
        const rect = c.getBoundingClientRect();
        const delay = (1 - (rect.left / viewportWidth)) * 1.5;
        c.style.transitionDelay = `${delay}s`;

        if (c.classList.contains('white')) {
          c.style.top = (Math.random() * 15) + 'vh';
        } else {
          c.style.top = (85 + Math.random() * 15) + 'vh';
        }
      });
    }

    function runMatrixEffect() {
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');

      canvas.style.display = 'block';
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const letters = 'ABCDEFGHIJKLMNOPQRSTUVXYZABCDEFGHIJKLMNOPQRSTUVXYZABCDEFGHIJKLMNOPQRSTUVXYZABCDEFGHIJKLMNOPQRSTUVXYZABCDEFGHIJKLMNOPQRSTUVXYZABCDEFGHIJKLMNOPQRSTUVXYZ'.split('');
      const fontSize = 20; // Bumped slightly for larger screens
      const columns = canvas.width / fontSize;

      const drops = [];
      for (let i = 0; i < columns; i++) {
        drops[i] = 1;
      }

      if (matrixInterval) clearInterval(matrixInterval);

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, .1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < drops.length; i++) {
          const text = letters[Math.floor(Math.random() * letters.length)];
          ctx.fillStyle = '#0f0'; // green text
          ctx.font = fontSize + 'px monospace'; // Make sure font matches size
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          drops[i]++;
          if (drops[i] * fontSize > canvas.height && Math.random() > .95) {
            drops[i] = 0;
          }
        }
      }

      matrixInterval = setInterval(draw, 33);

      // End after 5 seconds, hide canvas, and show completion text
      setTimeout(() => {
        clearInterval(matrixInterval);
        canvas.style.display = 'none';
        showText('FIRMAMENT STABILIZED');
      }, 5000);
    }

    // Connect to Server-Sent Events for VBS Control
    function connectSSE() {
      const source = new EventSource('/api/vbs/events');

      source.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'play_video') {
            playVideo(data.payload.url);
          } else if (data.type === 'play_sfx') {
            playSfx(data.payload.url, data.payload.loop);
          } else if (data.type === 'stop_all') {
            stopAll();
          } else if (data.type === 'show_text') {
            showText(data.payload.text);
          } else if (data.type === 'hide_text') {
            hideText();
          } else if (data.type === 'toggle_bubbles') {
            toggleCircles();
          } else if (data.type === 'separate_bubbles') {
            separateCircles();
          } else if (data.type === 'matrix_effect') {
            runMatrixEffect();
          }
        } catch (e) {
          console.error('Error parsing SSE message:', e);
        }
      };

      source.onerror = (error) => {
        console.error('SSE Error:', error);
        source.close();
        setTimeout(connectSSE, 3000); // Reconnect after 3s
      };
    }

    // Start SSE connection
    connectSSE();
  </script>
</body>

</html>
